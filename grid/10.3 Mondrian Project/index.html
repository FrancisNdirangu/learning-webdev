<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mondrian Project</title>
  <style>
    /* 
    Write your CSS here 
    Gap Colour: #000
    White: #F0F1EC
    Red: #E72F24
    Black: #232629
    Blue: #004592
    Yellow: #F9D01E

    For dimensions, see dimensions.png image.
    HINT: Remember you can't change the properties of grid lines.
    But grid lines are transparent!
    */
  .container {
    display: grid;
    grid-template-columns: 320px 198px 153px 50px;
    grid-template-rows: 414px 130px 155px 20px;
    justify-content: center;
  }
  .red {
    background-color: red;
    grid-column: 1;
    border-right: solid black 9px;
    border-bottom: solid black 9px;
  }
  .blue {
    background-color: #004592;
    grid-column: 4;
    grid-row: 2;
    border-bottom: solid black 10px;
    border-left: solid black 9px;
  }

  .yellow {
    background-color: #F9D01E;
    grid-column: 2;
    grid-row:4;
  }

  .black {
    background-color: black;
    grid-row: 4;
    grid-column: 3;
  }

  .topright,.row2left,.row2middle,.row3left,.row2right {
    background-color: #F0F1EC;
  }

  .row2left {
    grid-row-start: 2;
    grid-row-end: 4;
    grid-column-start: 1;
    grid-column-end: 2;
    border-right: solid black 9px;
    border-bottom: solid black 9px;
  }
  .row3left {
    grid-row: 4;
    grid-column-start: 1;
    grid-column-end: 2;
    border-right: solid black 9px;
  }

  .topright {
    grid-column-start: 2;
    grid-column-end: 5;
    border-bottom: solid black 9px;

  }
  .row2middle {
    grid-row-start: 2;
    grid-row-end: 4;
    grid-column-start: 2;
    grid-column-end: 4;
  }

  .row2right {
    grid-row-start: 3;
    grid-row-end: 5;
    border-left: solid black 9px;

  }

  </style>
</head>

<body>
  <!-- Write your HTML here -->
  <div class="container">
    <div class="red">red</div>
    <div class="blue">blue</div>
    <div class="yellow">yellow</div>
    <div class="black">black</div>
    <div class="topright">topright</div>
    <div class="row2left">bottomleft</div>
    <div class="row2middle">bottommiddle</div>
    <div class="row2right">row2right</div>
    <div class="row3left">row3left</div>
    </div>
</body>

</html>
